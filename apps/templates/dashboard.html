<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafetyEye Dashboard</title>
    <style>
        body { font-family: sans-serif; background-color: #1e1e19; color: white; text-align: center; margin: 0; padding: 20px; }
        h1 { color: #ff6b6b; }
        .container { display: flex; flex-direction: column; align-items: center; }
        .video-box { border: 5px solid #444; border-radius: 10px; overflow: hidden; margin-bottom: 20px; }
        img { width: 100%; max-width: 800px; height: auto; }
        .stats-box { background: #333; padding: 20px; border-radius: 10px; font-size: 24px; min-width: 200px; }
        .violation-count { color: #ff6b6b; font-weight: bold; font-size: 40px; }
    </style>
    <script>
        function updateStats() {
            fetch('/stats')
                .then(response => response.json())
                .then(data => {
                    document.getElementById('count').innerText = data.violation_count;
                })
                .catch(error => console.error('Error fetching stats:', error));
        }
        setInterval(updateStats, 1000); // Poll every second
    </script>
</head>
<body>
    <h1>👷 SafetyEye Monitoring Dashboard</h1>
    
    <div class="container">
        <div class="video-box">
            <img src="{{ url_for('video_feed') }}" alt="Live Web Stream">
        </div>

        <div class="stats-box">
            <div>Total Violations</div>
            <div id="count" class="violation-count">0</div>
        </div>
    </div>
</body>
</html>
